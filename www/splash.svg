<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#081424"/>

  <!-- Orb rings (outermost first) -->
  <circle cx="540" cy="806" r="130" fill="none" stroke="rgba(37,201,186,0.04)" stroke-width="1.5"/>
  <circle cx="540" cy="806" r="110" fill="none" stroke="rgba(37,201,186,0.08)" stroke-width="1.5"/>
  <circle cx="540" cy="806" r="90"  fill="none" stroke="rgba(37,201,186,0.15)" stroke-width="1.5"/>

  <!-- Orb radial gradient -->
  <defs>
    <radialGradient id="orb" cx="42%" cy="38%" r="50%">
      <stop offset="0%"   stop-color="#57DDCF"/>
      <stop offset="45%"  stop-color="#13A99B"/>
      <stop offset="100%" stop-color="#0C6A61"/>
    </radialGradient>
  </defs>
  <circle cx="540" cy="806" r="80" fill="url(#orb)"/>

  <!-- Wordmark -->
  <text x="540" y="926" font-family="Georgia, serif" font-style="italic"
        font-size="72" font-weight="500" fill="#25C9BA" text-anchor="middle">Iona</text>

  <!-- Tagline -->
  <text x="540" y="978" font-family="Arial, Helvetica, sans-serif"
        font-size="29" fill="#586A7A" text-anchor="middle">Personal presence service</text>
</svg>
