<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Iona · 10 · 20 · 30</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@1,400&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#25C9BA; --amber:#E0973A;
    --bg:#0E1414; --card:#161E1E; --card-hi:#1D2828;
    --line:#243030; --text:#E8EFEE; --dim:#8A9A99;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;padding:0 18px 48px;min-height:100vh;
    background:var(--bg);color:var(--text);
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    display:flex;flex-direction:column;justify-content:center;
  }
  header{padding:34px 0 22px;text-align:center}
  .orb{
    width:42px;height:42px;margin:0 auto 12px;border-radius:50%;
    background:radial-gradient(circle at 38% 34%,#4FE6D6,var(--teal) 58%,#0F7C74);
    box-shadow:0 0 26px rgba(37,201,186,.42);
  }
  h1{font-family:'Newsreader',serif;font-style:italic;font-weight:400;font-size:27px;margin:0 0 6px}
  .sub{color:var(--dim);font-size:12.5px;margin:0;line-height:1.5}

  .rows{display:flex;flex-direction:column;gap:12px;max-width:520px;width:100%;margin:0 auto}

  .snd{
    display:flex;align-items:center;gap:15px;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:20px 18px;color:var(--text);font:inherit;cursor:pointer;
    transition:background .12s,border-color .12s,transform .06s;
  }
  .snd:active{transform:scale(.985)}
  .snd.lit{background:var(--card-hi);border-color:var(--teal)}
  .snd.lit .num{background:var(--teal);color:#06201E}

  .num{
    flex:none;width:42px;height:42px;border-radius:12px;
    background:#22302F;color:var(--dim);
    display:grid;place-items:center;
    font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;
    transition:background .12s,color .12s;
  }
  .txt{min-width:0;flex:1}
  .role{
    font-size:9.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
    color:var(--dim);margin-bottom:3px;
  }
  .name{font-size:17px;font-weight:600;margin-bottom:3px}
  .desc{font-size:12.5px;color:var(--dim);line-height:1.4}

  .set{
    margin:22px auto 0;max-width:520px;width:100%;
    background:transparent;border:1px dashed var(--line);
    border-radius:16px;padding:18px;color:var(--text);
    font:inherit;font-size:14px;font-weight:600;cursor:pointer;
    transition:border-color .12s,background .12s;
  }
  .set:active{background:var(--card)}
  .set.on{border-color:var(--amber);color:var(--amber);border-style:solid}
  .set small{display:block;font-weight:400;font-size:11.5px;color:var(--dim);margin-top:4px}

  .ctl-row{display:flex;gap:9px;align-items:center;justify-content:center;margin:20px 0 6px;flex-wrap:wrap}
  .ctl{
    background:var(--card);border:1px solid var(--line);color:var(--text);
    padding:8px 14px;border-radius:999px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;
  }
  .ctl.on{background:rgba(37,201,186,.14);border-color:var(--teal);color:var(--teal)}
  .vol{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--dim)}
  input[type=range]{width:100px;accent-color:var(--teal)}
</style>
</head>
<body>

<header>
  <div class="orb"></div>
  <h1>Ten · Twenty · Thirty</h1>
  <p class="sub">Tap each. Then tap them as a set.</p>
</header>

<div class="rows" id="rows"></div>

<button class="set" id="set">
  Play as a set
  <small>Tap → Navigate → Confirm, the way a member would hear them</small>
</button>

<div class="ctl-row">
  <button class="ctl on" id="vib">Vibrate: on</button>
  <div class="vol"><span>Vol</span><input type="range" id="vol" min="0" max="100" value="55"></div>
</div>

<script>
let ctx=null;
function ac(){
  if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
  return ctx;
}
let vibOn=true, vol=0.55;

function voice(v,base,offset){
  const c=ac(), t0=c.currentTime+(v.at||0)+(offset||0);
  const osc=c.createOscillator(), gain=c.createGain();
  let node=osc;
  osc.type=v.type||'sine';
  osc.frequency.setValueAtTime(v.f,t0);
  if(v.to) osc.frequency.exponentialRampToValueAtTime(v.to,t0+v.dur);
  if(v.lp){
    const f=c.createBiquadFilter(); f.type='lowpass';
    f.frequency.setValueAtTime(v.lp,t0);
    if(v.lpTo) f.frequency.exponentialRampToValueAtTime(v.lpTo,t0+v.dur);
    osc.connect(f); node=f;
  }
  node.connect(gain); gain.connect(c.destination);
  const peak=Math.max(0.0001,(v.g||1)*base*vol), atk=v.atk||0.002;
  gain.gain.setValueAtTime(0.0001,t0);
  gain.gain.exponentialRampToValueAtTime(peak,t0+atk);
  gain.gain.exponentialRampToValueAtTime(0.0001,t0+v.dur);
  osc.start(t0); osc.stop(t0+v.dur+0.03);
}
function play(s,offset,silentVib){
  s.v.forEach(v=>voice(v,s.base||0.10,offset));
  if(!silentVib && vibOn && navigator.vibrate) navigator.vibrate(s.vib);
}

const SOUNDS=[
 {n:10, role:'Tap', name:'Teal',
  desc:'Pure C6, eleven milliseconds. The brand note — clean, and gone before you notice it.',
  vib:8, base:.07, v:[{f:1046,dur:.011}]},

 {n:20, role:'Navigate', name:'Orb',
  desc:'Root and fifth sounded together. Open, unhurried — the Iona interval.',
  vib:12, base:.07, v:[{f:880,dur:.075},{f:1320,dur:.075,g:.42}]},

 {n:30, role:'Confirm', name:'Signal',
  desc:'A teal note, then an amber one answering it. Two characters, one exchange.',
  vib:[10,40,16], base:.08, v:[{f:784,dur:.10},{f:987,dur:.20,at:.095,atk:.003}]}
];

const rows=document.getElementById('rows');
SOUNDS.forEach(s=>{
  const b=document.createElement('button');
  b.className='snd';
  b.innerHTML='<span class="num">'+s.n+'</span><span class="txt">'+
    '<span class="role">'+s.role+'</span>'+
    '<span class="name">'+s.name+'</span>'+
    '<span class="desc">'+s.desc+'</span></span>';
  b.addEventListener('click',()=>{
    play(s);
    b.classList.add('lit');
    setTimeout(()=>b.classList.remove('lit'),340);
  });
  rows.appendChild(b);
});

/* sequence — spaced the way a real flow feels, not back-to-back */
const setBtn=document.getElementById('set');
const GAPS=[0, 0.62, 1.34];
setBtn.addEventListener('click',()=>{
  ac();
  setBtn.classList.add('on');
  SOUNDS.forEach((s,i)=>{
    play(s,GAPS[i],true);
    setTimeout(()=>{
      if(vibOn && navigator.vibrate) navigator.vibrate(s.vib);
      const row=rows.children[i];
      row.classList.add('lit');
      setTimeout(()=>row.classList.remove('lit'),300);
    }, GAPS[i]*1000);
  });
  setTimeout(()=>setBtn.classList.remove('on'), 1900);
});

const vb=document.getElementById('vib');
vb.addEventListener('click',()=>{
  vibOn=!vibOn;
  vb.textContent='Vibrate: '+(vibOn?'on':'off');
  vb.classList.toggle('on',vibOn);
  if(vibOn&&navigator.vibrate) navigator.vibrate(12);
});
document.getElementById('vol').addEventListener('input',e=>{vol=e.target.value/100;});
</script>
</body>
</html>
